name: OT Secure Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.10'

      # SAST Tool: Bandit checks for insecure Python code patterns
      - name: Run Bandit (Python SAST)
        run: |
          pip install --no-cache-dir --quiet bandit
          bandit -r src/ -f txt -o bandit-results.txt || true
          cat bandit-results.txt

      # Open-Source SBOM Generation using a pure internal Python runtime execution block
      - name: Generate CycloneDX SBOM via Native Python Engine
        run: |
          pip install --no-cache-dir --quiet cyclonedx-python-lib packageurl-python
          python scripts/generate_sbom.py

      # Archive the built SBOM artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: python-iot-sbom
          path: bom.json

      # Build and securely verify the container image artifact simulation environment
      - name: Build Local Simulation Image Artifact
        run: |
          docker build -t ot-edge-gateway:latest .

      # Deploys safe, SHA-pinned version of setup-trivy to scan container layer images
      - name: Deploy Aquasecurity Trivy Node
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          cache: true
          version: v0.69.3

      # Scan the finalized image container for embedded kernel bugs before release
      - name: Evaluate Container Vulnerabilities
        run: |
          trivy image --exit-code 0 --format table ot-edge-gateway:latest
