name: OT Secure Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # SAST Tool: Bandit checks for insecure Python code patterns
      - name: Run Bandit (Python SAST)
        run: |
          pip install --no-cache-dir --quiet bandit
          bandit -r src/ -f txt -o bandit-results.txt || true
          cat bandit-results.txt

      # Open-Source SBOM Generation using CycloneDX Native CLI (FIXED PARAMETER LAYOUT)
      - name: Generate CycloneDX SBOM via Native CLI
        run: |
          pip install --no-cache-dir --quiet cyclonedx-bom
          # FIX: Re-ordered switches so format and output modify the subcommand context properly
          cyclonedx-py requirements --format json --output-file bom.json requirements.txt

      # Archive the built SBOM artifact
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-iot-sbom
          path: bom.json
